<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zcoder-yyf 的技术博客 & OJ 终极版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* 动态二次元背景层：国内极其稳定的二次元API，每次刷新随机显示，加入全屏遮罩防刺眼 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            color: #333; 
            background: linear-gradient(rgba(244, 245, 247, 0.82), rgba(244, 245, 247, 0.82)), 
                        url('https://api.ixiaowai.cn/api/api.php') no-repeat center center fixed;
            background-size: cover;
        }
        
        /* 侧边栏：半透明磨砂玻璃，高逼格不遮挡背景 */
        .sidebar { 
            width: 260px; 
            height: 100vh; 
            background: rgba(22, 27, 34, 0.95); 
            backdrop-filter: blur(8px);
            color: #fff; 
            position: fixed; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            z-index: 10;
        }
        .profile { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #30363d; }
        .profile img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff; }
        .profile h2 { margin-top: 10px; font-size: 18px; }
        .menu { margin-top: 20px; flex: 1; }
        .menu-item { padding: 12px; color: #cbd5e1; cursor: pointer; border-radius: 6px; margin-bottom: 5px; list-style: none; transition: 0.2s; font-size: 15px; }
        .menu-item:hover, .menu-item.active { background: #1f6feb; color: #fff; }

        /* 内容区面板：白色卡片带微微透明 */
        .main-content { margin-left: 260px; flex: 1; padding: 40px; max-width: 1200px; z-index: 1; }
        .page-panel { display: none; }
        .page-panel.active { display: block; }
        
        .waiting-box { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 8px; border-left: 5px solid #eab308; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* AcWing 表格卡片 */
        .acwing-card { background: rgba(255, 255, 255, 0.95); border: 1px solid #e2e8f0; border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 30px; }
        .acwing-header { background: #fafafa; padding: 15px 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .acwing-header h2 { font-size: 18px; color: #1f2328; font-weight: 600; }
        .acwing-table { width: 100%; border-collapse: collapse; background: transparent; }
        .acwing-table th { background: #f6f8fa; text-align: left; padding: 12px 20px; font-size: 14px; color: #656d76; border-bottom: 1px solid #d0d7de; }
        .acwing-table td { padding: 12px 20px; font-size: 14px; color: #24292f; border-bottom: 1px solid #d0d7de; }
        .acwing-table tr:hover { background: rgba(31, 111, 235, 0.05); }
        .title-link { color: #0969da; text-decoration: none; font-weight: 500; cursor: pointer; }
        .title-link:hover { text-decoration: underline; }
        
        /* ================= OJ 左右分屏对照布局 ================= */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: #fff; width: 95%; max-width: 1400px; height: 92vh; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; animation: fadeIn 0.15s ease-out; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { background: #161b22; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; }
        
        /* 左右分屏 */
        .modal-body { flex: 1; display: flex; overflow: hidden; background: #ffffff; }
        
        /* 左半区：题目 或 题解 */
        .left-panel { flex: 1; border-right: 2px solid #e2e8f0; display: flex; flex-direction: column; background: #fafafa; overflow: hidden; }
        .problem-desc { padding: 25px; overflow-y: auto; font-size: 15px; line-height: 1.6; color: #24292f; height: 100%; }
        .solution-box { display: none; flex-direction: column; height: 100%; }
        .solution-header { padding: 12px 20px; background: #f0f3f6; border-bottom: 1px solid #e2e8f0; font-weight: bold; color: #0969da; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        
        /* 右半区：用户编辑区 */
        .right-panel { flex: 1; display: flex; flex-direction: column; position: relative; background: #ffffff; }
        .editor-header { padding: 12px 20px; background: #ffffff; border-bottom: 1px solid #e2e8f0; font-weight: bold; color: #24292f; font-size: 14px; }
        
        .code-area { flex: 1; position: relative; }
        
        /* ================= 像素级复刻：专属白底 蓝黑红 极简高亮主题 ================= */
        /* 强制背景纯白，文字纯黑，字号18px，采用截图同款标准等宽字体 */
        .cm-s-acwing-custom.CodeMirror { 
            background: #ffffff; 
            color: #000000; 
            font-size: 18px !important; 
            font-family: 'SF Mono', Consolas, Monaco, Menlo, 'Courier New', monospace; 
            line-height: 1.5; 
            height: 100%; 
        }
        /* 行号区极浅灰背景，带细边框 */
        .cm-s-acwing-custom .CodeMirror-gutters { background: #f8f9fa; border-right: 1px solid #e0e0e0; }
        .cm-s-acwing-custom .CodeMirror-linenumber { color: #888888; }
        
        /* 蓝色：关键字、类型、宏定义、数字（去掉加粗，完全同款） */
        .cm-s-acwing-custom .cm-keyword,
        .cm-s-acwing-custom .cm-type,
        .cm-s-acwing-custom .cm-meta,
        .cm-s-acwing-custom .cm-builtin,
        .cm-s-acwing-custom .cm-number { color: #0000ff; font-weight: normal; } 
        
        /* 红色：尖括号内的内容 */
        .cm-s-acwing-custom .cm-string,
        .cm-s-acwing-custom .cm-string-2 { color: #ff0000; }
        
        /* 纯黑色：变量、符号、定义等全部归黑 */
        .cm-s-acwing-custom .cm-operator,
        .cm-s-acwing-custom .cm-variable,
        .cm-s-acwing-custom .cm-variable-2,
        .cm-s-acwing-custom .cm-variable-3,
        .cm-s-acwing-custom .cm-def,
        .cm-s-acwing-custom .cm-comment,
        .cm-s-acwing-custom .cm-property { color: #000000; }
        
        .cm-s-acwing-custom .CodeMirror-cursor { border-left: 2px solid #000000; }
        .cm-s-acwing-custom .CodeMirror-selected { background: #b3d4fc; }

        /* 底部操作栏 */
        .action-bar { display: flex; padding: 15px 20px; background: #fafafa; border-top: 1px solid #e2e8f0; gap: 15px; }
        .btn { border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; flex: 1; }
        .btn-submit { background: #238636; color: #fff; }
        .btn-submit:hover { background: #2ea043; }
        .btn-solution { background: #0969da; color: #fff; }
        .btn-solution:hover { background: #388bfd; }

        /* 后端不会提示框 */
        .toast { display: none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #1f6feb; color: #fff; padding: 15px 40px; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 20px rgba(0,0,0,0.3); z-index: 2000; font-size: 18px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="toast" id="oj-toast">后端不会,自己对答案 🙂</div>

    <div class="sidebar">
        <div class="profile">
            <img src="https://github.com/Zcoder-yyf.png" alt="Avatar">
            <h2>Zcoder-yyf</h2>
            <p style="font-size: 12px; color: #8b949e; margin-top: 5px;">算法修炼中</p>
        </div>
        <ul class="menu">
            <li class="menu-item" data-target="unity-panel">🎮 游戏引擎 (Unity)</li>
            <li class="menu-item active" data-target="algorithm-panel">🧮 算法与竞赛</li>
        </ul>
    </div>

    <div class="main-content">
        <div id="unity-panel" class="page-panel">
            <div class="waiting-box">
                <h3 style="color: #854d0e; margin-bottom: 10px;">⏳ 等待作者 push...</h3>
                <p style="color: #666; font-size: 14px;">Unity 相关技术文档与项目沉淀正在整理中，敬请期待！</p>
            </div>
        </div>

        <div id="algorithm-panel" class="page-panel active">
            <div id="acwing-list-container"></div>
        </div>
    </div>

    <div class="modal-overlay" id="oj-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="modal-title">题目加载中...</h3>
                <span style="cursor:pointer; font-size:26px; font-weight:bold; color:#8b949e;" onclick="closeOJ()">×</span>
            </div>
            <div class="modal-body">
                
                <div class="left-panel">
                    <div id="modal-desc" class="problem-desc"></div>
                    
                    <div id="solution-box" class="solution-box">
                        <div class="solution-header">
                            <span>✅ 标程题解 (对照区)</span>
                        </div>
                        <div class="code-area">
                            <textarea id="solution-input"></textarea>
                        </div>
                    </div>
                </div>

                <div class="right-panel">
                    <div class="editor-header">💻 代码编辑区 (C++11)</div>
                    <div class="code-area">
                        <textarea id="editor-input"></textarea>
                    </div>
                    <div class="action-bar">
                        <button class="btn btn-solution" id="sol-btn" onclick="toggleSolution()">查看题解 (对照答案)</button>
                        <button class="btn btn-submit" onclick="submitCode()">提交运行</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/edit/closebrackets.min.js"></script>

    <script>
        const menuItems = document.querySelectorAll('.menu-item');
        const panels = document.querySelectorAll('.page-panel');

        // 右侧：用户代码编辑器配置
        let editor = CodeMirror.fromTextArea(document.getElementById("editor-input"), {
            mode: "text/x-c++src",
            theme: "acwing-custom", 
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            lineWrapping: true,
            autoCloseBrackets: true, // 开启大括号、小括号自动补全！
            extraKeys: {
                "Tab": function(cm) {
                    var spaces = Array(cm.getOption("indentUnit") + 1).join(" ");
                    cm.replaceSelection(spaces);
                }
            }
        });

        // 左侧：题解只读代码编辑器配置
        let solutionEditor = CodeMirror.fromTextArea(document.getElementById("solution-input"), {
            mode: "text/x-c++src",
            theme: "acwing-custom",
            lineNumbers: true,
            lineWrapping: true,
            readOnly: true // 题解区不可编辑
        });

        // 全量核心题目源码字典
        const allProblems = [
            { id: "qs", cat: "基础算法", name: "快速排序", code: `// 快速排序\n#include <iostream> \nusing namespace std; \nconst int N = 1e6 + 10;\nint q[N];\nvoid quick_sort(int q[],int l,int r)\n{\n\tif(l >= r) return;\n\tint x = q[(l + r + 1) / 2],i = l - 1,j = r + 1;\n\twhile(i < j)\n\t{\n\t\tdo i++;while(q[i] < x);\n\t\tdo j--;while(q[j] > x);\n\t\t\n\t\tif(i < j) swap(q[i],q[j]);\n\t}\n\tquick_sort(q,l,i-1),quick_sort(q,i,r);\n}\nvoid solve()\n{\n\tint n;\n\tcin >> n;\n\tfor(int i=0;i<n;i++) cin >> q[i];\n\tquick_sort(q,0,n-1);\n\tfor(int i=0;i<n;i++) cout << q[i] << ' ';\n}\nint main()\n{\n\tios::sync_with_stdio(0),cin.tie(0),cout.tie(0);\n\tint _;_ = 1;\n\twhile(_--) solve();\n\treturn 0;\n}` },
            { id: "ms", cat: "基础算法", name: "归并排序", code: `// 归并排序\n#include <iostream> \nusing namespace std;\nconst int N = 1e6 + 10;\nint q[N],temp[N];\nvoid merge_sort(int q[],int l,int r)\n{\n\tif(l >= r) return;\n\tint mid = l + r >> 1;\n\tmerge_sort(q,l,mid-1),merge_sort(q,mid,r);\n\t\n\tint k = 0,i = l,j = mid + 1;\n\twhile(i <= mid && j <= r)\n\t{\n\t\tif(q[i] <= q[j]) temp[k++] = q[i++];\n\t\telse temp[k++] = q[j++];\n\t}\n\twhile(i <= mid) temp[k ++] = q[i++];\n\twhile(j <= r) temp[k++] = q[j++];\n\t\n\tfor(int i=l,j = 0;i <= r;i++) q[i] = temp[j];\n}\nvoid solve()\n{\n\tint n ;\n\tcin >> n;\n\tfor(int i=0;i<n;i++) cin >> q[i];\n\tmerge_sort(q,0,n-1);\n\tfor(int i=0;i<n;i++) cout << q[i] << ' ';\n}\nint main()\n{\n\tios::sync_with_stdio(0),cin.tie(0),cout.tie(0);\n\tint _;_ = 1;\n\twhile(_--) solve();\n\treturn 0;\n}` },
            { id: "bs", cat: "基础算法", name: "二分查找", code: `// 整数二分\n#include <iostream> \nusing namespace std;\nconst int N = 1e6 + 10;\nint q[N];\nvoid solve()\n{\n\tint n,q_cnt;\n\tcin >> n >> q_cnt;\n\twhile(n--)\n\t{\n\t\tint k;\n\t\tcin >> k;\n\t\tint l = -1,r = q_cnt;\n\t\twhile(l + 1 != r)\n\t\t{\n\t\t\tint mid = l + r >> 1;\n\t\t\tif(q[mid] < k) l = mid;\n\t\t\telse r = mid;\n\t\t}\n\t\tint start_idx = r;\n\t\t\n\t\tl = -1,r = q_cnt;\n\t\twhile(l + 1 != r)\n\t\t{\n\t\t\tint mid = l + r >> 1;\n\t\t\tif(q[mid] <= k) l = mid;\n\t\t\telse r = mid;\n\t\t}\n\t\tint end_idx = l;\n\t\tcout << start_idx << ' ' << end_idx << endl;\n\t}\n}\nint main()\n{\n\tios::sync_with_stdio(0),cin.tie(0),cout.tie(0);\n\tint _;_ = 1;\n\twhile(_--) solve();\n\treturn 0;\n}` },
            { id: "hp_add", cat: "基础算法", name: "高精度加法", code: `// 高精度加法\n#include <iostream> \n#include <vector> \n#include <algorithm> \nusing namespace std;\nvector<int> add(vector<int> &A,vector<int> &B)\n{\n\tvector<int> C;\n\tint t = 0;\n\tfor(int i=0;i<A.size() || i<B.size();i++)\n\t{\n\t\tif(i < A.size()) t += A[i];\n\t\tif(i < B.size()) t += B[i];\n\t\tC.push_back(t % 10);\n\t\tt /= 10;\n\t}\n\tif(t) C.push_back(1);\n\treturn C;\n}` },
            { id: "hp_sub", cat: "基础算法", name: "高精度减法", code: `// 高精度减法\n#include <iostream> \n#include <vector>\nusing namespace std;\nbool cmp(vector<int> &A,vector<int> &B)\n{\n\tif(A.size() != B.size()) return A.size() > B.size();\n\tfor(int i=A.size() - 1;i >= 0;i--) if(A[i] != B[i]) return A[i] > B[i];\n\treturn true;\n}` },
            { id: "hp_mul", cat: "基础算法", name: "高精度乘法", code: `// 高精度乘法\n#include <iostream> \n#include <vector>\nusing namespace std;\nvector<int> mul(vector<int> &A,vector<int> &B)\n{\n\tvector<int> C(A.size() + B.size(),0);\n\tfor(int i=0;i<A.size();i++)\n\t\tfor(int j=0;j<B.size();j++) C[i + j] += A[i] * B[j];\n\tint t = 0;\n\tfor(int i=0;i<C.size();i++) { t += C[i]; C[i] = t % 10; t /= 10; }\n\twhile(C.size() > 1 && C.back() == 0) C.pop_back();\n\treturn C;\n}` },
            { id: "hp_div", cat: "基础算法", name: "高精度除法", code: `// 高精度除法\n#include <iostream> \n#include <vector>\n#include <algorithm>\nusing namespace std;\nvector<int> div(vector<int> &A, int b, int &r)\n{\n\tvector<int> C; r = 0;\n\tfor(int i=A.size() - 1;i >= 0;i--) { r = r * 10 + A[i]; C.push_back(r / b); r %= b; }\n\treverse(C.begin(),C.end());\n\twhile(C.size() > 1 && C.back() == 0) C.pop_back();\n\treturn C;\n}` },
            { id: "hp_sq", cat: "基础算法", name: "大数字平方差", code: `// 大数字平方差\n#include <iostream> \n#include <vector> \nusing namespace std;\nvoid solve()\n{\n\tstring s1,s2; cin >> s1 >> s2;\n\tauto add_part = add(A,B);\n\tauto sub_part = cmp(A,B) ? sub(A,B) : sub(B,A);\n\tauto res = mul(add_part,sub_part);\n\tif(!cmp(A,B) && !(res.size() == 1 && res[0] == 0)) cout << '-';\n}` },
            { id: "pf1", cat: "基础算法", name: "一维前缀和", code: `// 一维前缀和\nfor(int i=1;i<=n;i++) q[i] += q[i-1];` },
            { id: "pf2", cat: "基础算法", name: "二维前缀和", code: `// 二维前缀和\ns[i][j] = s[i-1][j] + s[i][j-1] - s[i-1][j-1] + a[i][j];` },
            { id: "df1", cat: "基础算法", name: "一维差分", code: `// 一维差分\nb[l] += c; b[r + 1] -= c;` },
            { id: "df2", cat: "基础算法", name: "二维差分", code: `// 二维差分公式插入\nvoid insert(int x1,int y1,int x2,int y2,int c) {\n\tb[x1][y1] += c; b[x2 + 1][y2 + 1] += c;\n\tb[x1][y2 + 1] -= c; b[x2 + 1][y1] -= c;\n}` },
            { id: "tp1", cat: "基础算法", name: "双指针(最长连续不重复子序列)", code: `while(s[a[i]] > 1) { s[a[j]]--; j++; }` },
            { id: "tp2", cat: "基础算法", name: "双指针(数组元素目标和)", code: `while(j >= 0 && a[i] + b[j] > x) j--;` },
            { id: "tp3", cat: "基础算法", name: "双指针(判断子序列)", code: `while(i < n && j < m) { if(a[i] == b[j]) i++; j++; }` },
            { id: "tp4", cat: "基础算法", name: "双指针(区间合并)", code: `if(ed < seg.first) { res.push_back({st,ed}); st=seg.first; }` },
            { id: "lowbit", cat: "基础算法", name: "lowbit运算", code: `while(x) x -= x & -x, res++;` },
            { id: "lsh", cat: "基础算法", name: "离散化(坐标映射)", code: `// 离散化二分查找\nint find(int x) {\n\tint l = -1,r = alls.size();\n\twhile(l + 1 != r) { int mid = l + r >> 1; if(alls[mid] < x) l = mid; else r = mid; }\n\treturn r + 1;\n}` },
            { id: "ll1", cat: "数据结构", name: "单链表(数组模拟)", code: `void add_to_head(int x) { e[idx] = x; ne[idx] = head; head = idx++; }` },
            { id: "stk1", cat: "数据结构", name: "单调栈", code: `while(tt && stk[tt] >= x) tt --;\nif(tt) cout << stk[tt] << ' '; else cout << -1 << ' ';` },
            { id: "stk_que", cat: "数据结构", name: "单调栈理论分析", code: `// 弹出所有递增破坏项\nwhile (tt != -1 && a[q[tt]] >= a[i]) tt--;` },
            { id: "window", cat: "数据结构", name: "单调队列(滑动窗口)", code: `if(hh <= tt && i - k + 1 > q[hh]) hh++;\nwhile(hh <= tt && a[q[tt]] >= a[i]) tt--;` },
            { id: "uf1", cat: "数据结构", name: "并查集(合并集合)", code: `int find(int x) { if(p[x] != x) p[x] = find(p[x]); return p[x]; }` },
            { id: "uf2", cat: "数据结构", name: "并查集(连通块)", code: `s[find(b)] += s[find(a)]; p[find(a)] = find(b);` },
            { id: "uf3", cat: "数据结构", name: "并查集(食物链)", code: `// 复杂带权距离关系变模运算\nd[x] += d[p[x]]; p[x] = t;` },
            { id: "heap", cat: "数据结构", name: "堆排序", code: `// 完全二叉树向下调整\nvoid down(int u) {\n\tint t = u;\n\tif(u * 2 <= sz && h[u * 2] < h[t]) t = u * 2;\n\tif(u * 2 + 1 <= sz && h[u * 2 + 1] < h[t]) t = u * 2 + 1;\n\tif(u != t) { swap(h[u], h[t]); down(t); }\n}` },
            { id: "hash1", cat: "数据结构", name: "哈希表(拉链法)", code: `int k = (x % N + N) % N; e[idx] = x; ne[idx] = h[k]; h[k] = idx ++;` },
            { id: "hash2", cat: "数据结构", name: "哈希表(开放寻址法)", code: `while(h[k] != null && h[k] != x) { k ++; if(k == N) k = 0; }` },
            { id: "dfs", cat: "数论与搜索", name: "深搜(排列组合)", code: `path[u] = i; st[i] = 1; dfs(u + 1); path[u] = 0; st[i] = 0;` },
            { id: "prime", cat: "数论与搜索", name: "质数筛", code: `if(prime[i]) { for(int j=i*i;j<=n;j+=i) prime[j] = false; }` },
            { id: "qpow", cat: "数论与搜索", name: "快速幂", code: `while(b > 0) { if(b & 1) res = res * a % mod; a = a * a % mod; b >>= 1; }` },
            { id: "gcd", cat: "数论与搜索", name: "GCD和LCM", code: `int gcd(int a,int b) { return b == 0 ? a : gcd(b,a % b); }` },
            { id: "comb1", cat: "组合数学", name: "组合数1(杨辉三角)", code: `q[i][j] = q[i-1][j] + q[i - 1][j - 1];` },
            { id: "comb2", cat: "组合数学", name: "组合数2(逆元运算)", code: `cout << (LL) fact[a] * infact[a - b] % mod * infact[b] % mod;` },
            { id: "comb3", cat: "组合数学", name: "组合数3(Lucas定理)", code: `return C(a % p,b % p) * lucas(a / p,b / p) % p;` },
            { id: "comb4", cat: "组合数学", name: "组合数4(勒让德定理)", code: `sum[i] = get(a,p) - get(b,p) - get(a-b,p);` }
        ];

        // 渲染首页表格
        const container = document.getElementById('acwing-list-container');
        let currentProb = null;
        let isShowingSolution = false; 

        let cardHtml = `
            <div class="acwing-card">
                <div class="acwing-header">
                    <h2>第一章 基础算法与数据结构</h2>
                </div>
                <table class="acwing-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">分类</th>
                            <th style="width: 50%;">题目名称</th>
                            <th style="width: 15%; text-align: right;">操作</th>
                            <th style="width: 15%; text-align: center;">状态</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        allProblems.forEach(prob => {
            cardHtml += `
                <tr>
                    <td>${prob.cat}</td>
                    <td><span class="title-link" onclick="openOJ('${prob.id}')">${prob.name}</span></td>
                    <td style="text-align: right; color:#8b949e; font-size:12px;">进入答题区</td>
                    <td style="text-align: center;" class="status-check">✔</td>
                </tr>
            `;
        });

        cardHtml += `</tbody></table></div>`;
        container.innerHTML = cardHtml;

        // 菜单卡片切换事件绑定
        menuItems.forEach(item => {
            item.addEventListener('click', () => {
                menuItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                panels.forEach(p => p.classList.remove('active'));
                document.getElementById(item.getAttribute('data-target')).classList.add('active');
            });
        });

        // 打开弹窗
        function openOJ(id) {
            currentProb = allProblems.find(p => p.id === id);
            if(!currentProb) return;
            
            document.getElementById('modal-title').innerText = currentProb.name;
            
            isShowingSolution = false;
            document.getElementById('modal-desc').style.display = "block";
            document.getElementById('solution-box').style.display = "none";
            document.getElementById('modal-desc').innerHTML = `<h3>${currentProb.name}</h3><br><p>请在右侧代码框内完成你的 C++ 代码编写。如果需要参考标程，请点击下方【查看题解】。</p>`;
            
            document.getElementById('sol-btn').innerText = "查看题解 (对照答案)";
            document.getElementById('sol-btn').style.background = "#0969da";
            
            document.getElementById('oj-modal').style.display = "flex";
            
            setTimeout(() => {
                editor.setValue(""); 
                editor.refresh();
                editor.focus();
            }, 50);
        }

        // 关闭弹窗
        function closeOJ() {
            document.getElementById('oj-modal').style.display = "none";
        }

        // 切换左侧题解
        function toggleSolution() {
            if(!currentProb) return;
            
            isShowingSolution = !isShowingSolution;
            
            if(isShowingSolution) {
                document.getElementById('modal-desc').style.display = "none";
                document.getElementById('solution-box').style.display = "flex";
                
                solutionEditor.setValue(currentProb.code);
                setTimeout(() => solutionEditor.refresh(), 50);
                
                document.getElementById('sol-btn').innerText = "返回查看题目描述";
                document.getElementById('sol-btn').style.background = "#6e7681";
            } else {
                document.getElementById('modal-desc').style.display = "block";
                document.getElementById('solution-box').style.display = "none";
                
                document.getElementById('sol-btn').innerText = "查看题解 (对照答案)";
                document.getElementById('sol-btn').style.background = "#0969da";
            }
        }

        // 提交代码弹窗
        function submitCode() {
            const toast = document.getElementById('oj-toast');
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
